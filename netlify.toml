[build]
  command = "corepack enable && pnpm build"

[build.environment]
  NODE_VERSION = "20"

# Do not set publish — Netlify's Next.js runtime handles output.
# In the Netlify UI, clear any legacy "Publish directory" (e.g. dist).

[context.production]
  command = "corepack enable && pnpm build"

[context.deploy-preview]
  command = "corepack enable && pnpm build"

# Legacy Vite HTML routes -> Next.js App Router paths
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/about.html"
  to = "/about"
  status = 301

[[redirects]]
  from = "/timeline.html"
  to = "/timeline"
  status = 301

[[redirects]]
  from = "/contact.html"
  to = "/contact"
  status = 301

[[redirects]]
  from = "/shop.html"
  to = "/shop"
  status = 301

[[redirects]]
  from = "/photography.html"
  to = "/works/photography"
  status = 301

[[redirects]]
  from = "/paintings.html"
  to = "/works/paintings"
  status = 301

[[redirects]]
